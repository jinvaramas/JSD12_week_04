<!DOCTYPE html>
<html>
<head>
  <title>CSS 3 Types</title>

  <!-- Internal Style -->
  <style>
    h2 {
      color: blue;
      background-color: lightgray;
    }
  </style>

  <!-- External Style -->
  <link rel="stylesheet" href="app.css">
</head>

<body>

  <!-- Inline Style -->
  <h1 style="color: red; background-color: yellow;">
    this is inline Style
  </h1>

  <!-- Internal Style -->
  <h2>this is internal Style</h2>

  <!-- External Style -->
  <p>this is External Style</p>

</body>
</html>
