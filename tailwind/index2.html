<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8f9fa] p-10">

    <div class="max-w-md mx-auto">
        <h2 class="text-4xl font-bold text-[#001e2b] mb-6">Depth</h2>
        
        <p class="text-[#001e2b] text-sm mb-8 leading-relaxed">
            Our employment and income outcomes within 3 and 6 months of program completion
        </p>

        <div class="mb-10">
            <div class="inline-block bg-[#34a853] text-[#001e2b] text-6xl font-black px-6 py-4 rounded-[2rem] mb-4">
                82%
            </div>
            <p class="text-[#001e2b] font-bold text-lg leading-tight">
                of graduates placed in jobs within six months of program completion (73% at three months)
            </p>
        </div>

        <div class="mb-10">
            <div class="inline-block bg-[#34a853] text-[#001e2b] text-5xl font-black px-6 py-4 rounded-[2rem] mb-4">
                $1.5 billion
            </div>
            <p class="text-[#001e2b] font-bold text-lg leading-tight">
                in cumulative wages earned by graduates since 2015
            </p>
        </div>
    </div>

</body>
</html>
